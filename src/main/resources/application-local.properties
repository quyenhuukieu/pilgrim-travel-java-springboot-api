spring.datasource.url=jdbc:h2:mem:pilgrimdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Fallback to a mock string locally, or map it to a local dev environment variable
sendgrid.api-key=${SENDGRID_API_KEY:SG.dev_mock_key_1234567890}
# Local development default fallback
sendgrid.email.from-address=${SENDGRID_FROM_EMAIL:no-reply@yourdomain.com}
